version: "3.8"

services:
  minecraft:
    image: eclipse-temurin:25-jre
    container_name: mc-26-1-2
    working_dir: /data
    command: sh -c "echo 'eula=true' > eula.txt && java -Xms1G -Xmx2G -jar server.jar nogui"
    ports:
      - "25565:25565"
    volumes:
      - /opt/minecraft_server:/data
    restart: unless-stopped
